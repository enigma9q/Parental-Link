name: Build APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: parental-link-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Read app version
        id: version
        shell: bash
        run: |
          VERSION_NAME=$(sed -n "s/.*versionName[[:space:]]*['\"]\([^'\"]*\)['\"].*/\1/p" app/build.gradle | head -n 1)
          VERSION_CODE=$(sed -n "s/.*versionCode[[:space:]]*\([0-9][0-9]*\).*/\1/p" app/build.gradle | head -n 1)

          if [ -z "$VERSION_NAME" ]; then
            echo "Could not read versionName from app/build.gradle" >&2
            exit 1
          fi

          if [ -z "$VERSION_CODE" ]; then
            echo "Could not read versionCode from app/build.gradle" >&2
            exit 1
          fi

          TAG_NAME="v${VERSION_NAME}"
          APK_NAME="parental-link-v${VERSION_NAME}.apk"

          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "apk_name=$APK_NAME" >> "$GITHUB_OUTPUT"

      - name: Build release APK
        run: ./gradlew clean assembleRelease --no-daemon --stacktrace

      - name: Prepare APK asset
        shell: bash
        run: |
          APK_SOURCE="app/build/outputs/apk/release/app-release.apk"
          test -f "$APK_SOURCE"
          cp "$APK_SOURCE" "${{ steps.version.outputs.apk_name }}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.apk_name }}
          path: ${{ steps.version.outputs.apk_name }}

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.version.outputs.apk_name }}
          name: Parental-Link ${{ steps.version.outputs.version_name }}
          tag_name: ${{ steps.version.outputs.tag_name }}
          body: |
            Java-native v0.9 prototype release.

            Highlights:
            - Rudimentary child launcher added with filtered child app list.
            - Child screen gets a Test launcher button.
            - Chat preset UI and quick replies cleaned up.
            - Parent and child persistent notifications refined.
            - Lock and timeout return flow improved.
